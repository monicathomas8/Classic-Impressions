{% extends "base.html" %}
{% load static %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/accounts.css' %}">{% endblock %}

{% block title %}Login | Classic Impressions{% endblock %}

{% block content %}
<section class="accounts-section">
  <div class="accounts-card">

    <h1 class="accounts-title">Welcome Back</h1>
    <p class="accounts-subtitle">Sign in to your account</p>

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="accounts-btn">Log In</button>
    </form>

    <p class="accounts-link">Need an account? <a href="{% url 'signup' %}">Sign up here</a></p>

  </div>
</section>
{% endblock %}
